app-id: pl.ottersoft.ottermark
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: ottermark

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=home
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/ottermark/cargo
    RUSTFLAGS: '--remap-path-prefix =../'

modules:
  - name: bun
    buildsystem: simple
    build-commands:
      - install -Dm755 bun /app/bin/bun
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.2.5/bun-linux-x64.zip
        sha256: 88f64bedee330ff4d6328e3e90c669bc7ac5314927c604f85e329ea2a1d1979b
        strip-components: 1
      - type: archive
        only-arches:
          - aarch64
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.2.5/bun-linux-aarch64.zip
        sha256: ee1b5cabb5fdbb25640787e329846ef41384ca8699db504f45bfee015f348b58
        strip-components: 1

  - name: ottermark
    buildsystem: simple
    build-commands:
      - bun install --frozen-lockfile
      - bun run build
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/ottermark /app/bin/ottermark
      - install -Dm644 flatpak/pl.ottersoft.ottermark.desktop /app/share/applications/pl.ottersoft.ottermark.desktop
      - install -Dm644 flatpak/pl.ottersoft.ottermark.metainfo.xml /app/share/metainfo/pl.ottersoft.ottermark.metainfo.xml
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/pl.ottersoft.ottermark.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/pl.ottersoft.ottermark.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/pl.ottersoft.ottermark.png
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/512x512/apps/pl.ottersoft.ottermark.png
    sources:
      - type: dir
        path: ..
