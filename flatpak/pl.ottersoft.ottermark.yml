app-id: pl.ottersoft.ottermark
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: ottermark

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=home
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1

modules:
  - name: ottermark
    buildsystem: simple
    build-commands:
      - install -Dm755 ottermark /app/bin/ottermark
      - install -Dm644 pl.ottersoft.ottermark.desktop /app/share/applications/pl.ottersoft.ottermark.desktop
      - install -Dm644 pl.ottersoft.ottermark.metainfo.xml /app/share/metainfo/pl.ottersoft.ottermark.metainfo.xml
      - install -Dm644 icons/32x32.png /app/share/icons/hicolor/32x32/apps/pl.ottersoft.ottermark.png
      - install -Dm644 icons/128x128.png /app/share/icons/hicolor/128x128/apps/pl.ottersoft.ottermark.png
      - install -Dm644 icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/pl.ottersoft.ottermark.png
      - install -Dm644 icons/icon.png /app/share/icons/hicolor/512x512/apps/pl.ottersoft.ottermark.png
    sources:
      - type: dir
        path: build-staging
